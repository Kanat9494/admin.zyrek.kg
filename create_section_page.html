<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать Страницу Секции</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .sidebar { min-height: calc(100vh - 90px); border-right: 1px solid #dee2e6; }
        .menu-item { background-color: #007bff; color: white !important; font-weight: 600; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom bg-white p-3 rounded shadow-sm">
        <div class="d-flex align-items-center">
            <button onclick="history.back()" class="btn btn-sm btn-outline-secondary me-3">← Назад к списку страниц</button>
            <h2 class="h4 mb-0 text-primary fw-bold">➕ Создание новой страницы (section_page)</h2>
        </div>
        <span id="status" class="badge bg-warning text-dark fs-6">Проверка сессии...</span>
    </div>

    <div id="admin-content" style="display: none;">
        <div class="row"> 
            
            <div class="col-md-4 col-lg-3 sidebar pe-3">
                <div class="card shadow-sm bg-white mb-3 p-2">
                    <div onclick="window.location.href='lessons.html'" class="p-2 rounded text-center menu-item" style="cursor: pointer;">
                        📚 Уроки
                    </div>
                </div>
            </div>

            <div class="col-md-8 col-lg-9 ps-4">
                <div class="card shadow-sm p-4 bg-white border-start border-primary border-4 mb-4">
                    <h4 class="h5 text-dark fw-bold mb-4">📝 Заполните поля страницы</h4>
                    
                    <form id="create-page-form" onsubmit="saveNewPage(event)">
                        
                        <div class="row g-3 mb-3">
                            <div class="col-md-5">
                                <label class="form-label small fw-bold text-muted">Название страницы (title)</label>
                                <input type="text" id="page-title" class="form-control" required placeholder="Например: Изучаем новые термины">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold text-muted">Тип страницы (type как int)</label>
                                <input type="number" id="page-type" class="form-control" value="1" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-bold text-muted">Длительность (duration, мин)</label>
                                <input type="number" id="page-duration" class="form-control" min="0" placeholder="0 (без лимита)">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Текст объяснения (explanation_text)</label>
                            <textarea id="page-explanation" class="form-control" rows="4" placeholder="Основное текстовое содержимое страницы..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Фокусный текст / Выделение (focus_text)</label>
                            <input type="text" id="page-focus" class="form-control" placeholder="Фраза или слово, на котором делается акцент">
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Подсказка (hint)</label>
                            <input type="text" id="page-hint" class="form-control" placeholder="Контекстная подсказка для пользователя, если он затрудняется с ответом">
                        </div>

                        <div class="card p-3 mb-4 bg-light border">
                            <label class="form-label small fw-bold text-primary mb-1">🎵 Аудио-сопровождение страницы</label>
                            <p class="text-muted small mb-2">Файл будет автоматически сохранен под именем согласно маске (форматы: .mp3, .wav)</p>
                            
                            <input type="file" id="audio-input" class="form-control form-control-sm mb-2" accept=".mp3, .wav" onchange="handleAudioSelection(this)">
                            
                            <div id="preview-block" style="display: none;">
                                <span class="badge bg-secondary mb-1">Предпрослушивание перед загрузкой:</span>
                                <audio id="audio-preview" controls class="w-100 mb-2"></audio>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-7">
                                <label class="form-label small fw-bold text-muted">Варианты ответов (options) — текст или через запятую</label>
                                <input type="text" id="page-options" class="form-control" placeholder="Вариант А, Вариант Б, Вариант В">
                            </div>
                            <div class="col-md-5">
                                <label class="form-label small fw-bold text-muted">Правильный ответ (correct_answer)</label>
                                <input type="text" id="page-correct" class="form-control" placeholder="Точное совпадение правильного ответа">
                            </div>
                        </div>

                        <div class="text-end border-top pt-3">
                            <button type="button" onclick="history.back()" class="btn btn-secondary me-2">Отмена</button>
                            <button type="submit" id="submit-btn" class="btn btn-success px-4">Создать страницу</button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://cptbrdxodxzbsorqphfl.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_XNNJhqA0GffvW5TI19pr2w_SQ8X_xYf'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let sectionId = null;
    let lessonId = null;
    let selectedAudioFile = null; 

    // 1. Проверяем сессию
    async function checkSession() {
        const statusEl = document.getElementById('status');
        const { data: { session } } = await supabaseClient.auth.getSession();

        if (session) {
            statusEl.innerText = `Админ: ${session.user.email}`;
            statusEl.className = "badge bg-success fs-6";
            document.getElementById('admin-content').style.display = 'block';
            await initPage(); // Асинхронная инициализация
        } else {
            alert("Доступ запрещен. Войдите в систему.");
            window.location.href = 'index.html';
        }
    }

    // 2. Считываем родительские ID из URL + Автоподгрузка lesson_id из БД в случае сбоя цепочки
    async function initPage() {
        const urlParams = new URLSearchParams(window.location.search);
        const sId = urlParams.get('section_id');
        const lId = urlParams.get('lesson_id');

        if (!sId) {
            alert("Ошибка: Не передан section_id!");
            history.back();
            return;
        }

        sectionId = parseInt(sId);
        lessonId = lId ? parseInt(lId) : null;

        // Железная защита от l0: если ссылки подвели, тянем lesson_id из таблицы секций напрямую
        if (!lessonId) {
            const { data: sectionData, error } = await supabaseClient
                .from('sections') 
                .select('lesson_id')
                .eq('id', sectionId)
                .single();
            
            if (!error && sectionData) {
                lessonId = sectionData.lesson_id;
            }
        }
    }

    // 3. Валидация и локальный запуск выбранного аудио
    function handleAudioSelection(input) {
        const file = input.files[0];
        if (!file) {
            selectedAudioFile = null;
            document.getElementById('preview-block').style.display = 'none';
            return;
        }

        const allowedExtensions = /(\.mp3|\.wav)$/i;
        if (!allowedExtensions.exec(file.name)) {
            alert("Ошибка: Допускаются только аудиофайлы формата .mp3 или .wav!");
            input.value = ''; 
            selectedAudioFile = null;
            document.getElementById('preview-block').style.display = 'none';
            return;
        }

        selectedAudioFile = file;

        const blobURL = URL.createObjectURL(file);
        const player = document.getElementById('audio-preview');
        player.src = blobURL;
        document.getElementById('preview-block').style.display = 'block';
    }

    // 4. Главная функция сохранения страницы
    async function saveNewPage(event) {
        event.preventDefault();
        
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "Создание...";

        const title = document.getElementById('page-title').value.trim();
        const type = parseInt(document.getElementById('page-type').value);
        
        // Получаем duration, преобразуем в число (если пусто — пишем null или 0)
        const durationInput = document.getElementById('page-duration').value;
        const duration = durationInput ? parseInt(durationInput) : null;

        const explanation_text = document.getElementById('page-explanation').value.trim();
        const focus_text = document.getElementById('page-focus').value.trim();
        const hint = document.getElementById('page-hint').value.trim(); 
        const options = document.getElementById('page-options').value.trim();
        const correct_answer = document.getElementById('page-correct').value.trim();

        // Шаг А: Создаем запись в таблице section_pages
        const { data: newPage, error: insertError } = await supabaseClient
            .from('section_pages')
            .insert([{
                title,
                type,
                duration, // Отправляем duration в Supabase
                explanation_text,
                focus_text,
                hint, 
                options,
                correct_answer,
                section_id: sectionId,
                lesson_id: lessonId
            }])
            .select('id')
            .single();

        if (insertError || !newPage) {
            alert("Ошибка при сохранении текста: " + insertError.message);
            btn.disabled = false;
            btn.innerText = "Создать страницу";
            return;
        }

        const generatedPageId = newPage.id;

        // Шаг Б: Если админ прикрепил аудиофайл, загружаем его в Storage
        if (selectedAudioFile) {
            btn.innerText = "Загрузка аудиофайла...";
            
            const fileExtension = selectedAudioFile.name.split('.').pop().toLowerCase();
            
            // Формируем точное имя файла. lessonId теперь гарантированно реальный.
            const finalAudioName = `l${lessonId || 0}_s${sectionId}_p${generatedPageId}.${fileExtension}`;

            const { data: storageData, error: storageError } = await supabaseClient
                .storage
                .from('lesson-audios')
                .upload(finalAudioName, selectedAudioFile, {
                    cacheControl: '3600',
                    upsert: true 
                });

            if (storageError) {
                alert(`Текст сохранен (ID: ${generatedPageId}), но аудио не загрузилось в бакет: ` + storageError.message);
            } else {
                // Извлекаем абсолютный публичный URL файла из хранилища Supabase
                const { data: { publicUrl } } = supabaseClient
                    .storage
                    .from('lesson-audios')
                    .getPublicUrl(finalAudioName);

                // Шаг В: Обновляем созданную строку в правильной таблице section_pages, прописывая путь
                const { error: updateError } = await supabaseClient
                    .from('section_pages')
                    .update({ audio_path: publicUrl })
                    .eq('id', generatedPageId);

                if (updateError) {
                    alert(`Текст и аудио загружены (ID: ${generatedPageId}), но не удалось обновить поле audio_path: ` + updateError.message);
                }
            }
        }

        alert("Страница успешно создана!");
        history.back(); 
    }

    checkSession();
</script>
</body>
</html>
