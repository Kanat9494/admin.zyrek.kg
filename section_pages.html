<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страницы Секции</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .sidebar { min-height: calc(100vh - 90px); border-right: 1px solid #dee2e6; }
        .menu-item { background-color: #007bff; color: white !important; font-weight: 600; }
        .page-card { transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .page-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1) !important; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom bg-white p-3 rounded shadow-sm">
        <div class="d-flex align-items-center">
            <button onclick="history.back()" class="btn btn-sm btn-outline-secondary me-3">← Назад</button>
            <h2 class="h4 mb-0 text-info fw-bold">📄 Список страниц (section_page)</h2>
        </div>
        <span id="status" class="badge bg-warning text-dark fs-6">Проверка сессии...</span>
    </div>

    <div id="admin-content" style="display: none;">
        <div class="row"> 
            
            <div class="col-md-4 col-lg-3 sidebar pe-3">
                <div class="card shadow-sm bg-white mb-3 p-2">
                    <div onclick="window.location.href='lessons.html'" class="p-2 rounded text-center menu-item" style="cursor: pointer;">
                        📚 Уроки
                    </div>
                </div>
            </div>

            <div class="col-md-8 col-lg-9 ps-4">
                
                <div class="card shadow-sm p-3 bg-white mb-4 border border-primary border-start-0 rounded text-start">
                    <button onclick="goToCreatePage()" class="btn btn-primary fw-bold px-4">
                        ➕ Добавить страницу
                    </button>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="h4 mb-0 text-secondary fw-bold">Доступные страницы</h3>
                    <span id="parent-info" class="badge bg-light text-dark border font-monospace">Секция: -- | Урок: --</span>
                </div>
                
                <div id="pages-container">
                    <div class="text-center my-5 text-muted">
                        <div class="spinner-border text-info mb-2" role="status"></div>
                        <div>Загрузка страниц из базы...</div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://cptbrdxodxzbsorqphfl.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_XNNJhqA0GffvW5TI19pr2w_SQ8X_xYf'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentSectionId = null;
    let currentLessonId = null;

    // 1. Проверяем сессию админа
    async function checkSession() {
        const statusEl = document.getElementById('status');
        const { data: { session } } = await supabaseClient.auth.getSession();

        if (session) {
            statusEl.innerText = `Админ: ${session.user.email}`;
            statusEl.className = "badge bg-success fs-6";
            document.getElementById('admin-content').style.display = 'block';
            initPage();
        } else {
            alert("Доступ запрещен. Войдите в систему.");
            window.location.href = 'index.html';
        }
    }

    // 2. Парсим параметры из URL
    function initPage() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // Пытаемся получить section_id (и на всякий случай lesson_id, если он уже передан в URL)
        const sId = urlParams.get('section_id');
        const lId = urlParams.get('lesson_id');
        
        if (!sId) {
            alert("Критическая ошибка: ID секции (section_id) не найден в ссылке!");
            window.location.href = 'lessons.html';
            return;
        }
        
        currentSectionId = parseInt(sId);
        if (lId) currentLessonId = parseInt(lId);

        document.getElementById('parent-info').innerText = `Section ID: ${currentSectionId}`;
        
        fetchSectionPages();
    }

    // 3. Вытягиваем список страниц по текущему section_id
    async function fetchSectionPages() {
        const container = document.getElementById('pages-container');
        
        const { data: pages, error } = await supabaseClient
            .from('section_pages') 
            .select('id, title, type, audio_path, lesson_id, section_id')
            .eq('section_id', currentSectionId);

        if (error) {
            container.innerHTML = `<div class="alert alert-danger">Ошибка Supabase: ${error.message}</div>`;
            return;
        }

        // Если в URL изначально не было lesson_id, берём его из первой попавшейся страницы этой секции
        if (!currentLessonId && pages && pages.length > 0 && pages[0].lesson_id) {
            currentLessonId = pages[0].lesson_id;
        }
        
        // Обновляем плашку с информацией для админа
        document.getElementById('parent-info').innerText = `Секция ID: ${currentSectionId} | Урок ID: ${currentLessonId || '--'}`;

        let html = "";
        // Сортируем страницы по возрастанию id
        const sortedPages = (pages || []).sort((a, b) => a.id - b.id);

        if (sortedPages.length === 0) {
            html = `<div class="alert alert-light border text-muted bg-white shadow-sm py-4 text-center">
                        На данный момент в этой секции нет ни одной страницы.<br>
                        Нажмите кнопку <strong>«Добавить страницу»</strong> сверху, чтобы наполнить её контентом.
                    </div>`;
            container.innerHTML = html;
            return;
        }

        sortedPages.forEach(page => {
            // Метка наличия аудиофайла
            const audioBadge = page.audio_path 
                ? `<span class="badge bg-success-subtle text-success border border-success-subtle ms-2">🎵 Аудио настроено</span>` 
                : `<span class="badge bg-light text-secondary border ms-2">Без аудио</span>`;
            
            // Красивый маркер типа страницы
            const typeBadge = `<span class="badge bg-secondary font-monospace ms-2">Type: ${page.type ?? 0}</span>`;

            html += `
                <div class="card shadow-sm my-3 border-start border-info border-3 bg-white page-card" onclick="goToUpdatePage(${page.id})">
                    <div class="card-body py-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="h6 text-dark fw-bold mb-1">📄 ${page.title || 'Страница без названия'}</h5>
                                <div class="d-flex gap-1 mt-1">
                                    ${typeBadge}
                                    ${audioBadge}
                                </div>
                            </div>
                            <div class="text-end d-flex align-items-center">
                                <small class="text-muted font-monospace me-3">ID: ${page.id}</small>
                                <span class="text-info fw-bold btn btn-sm btn-light border">Редактировать →</span>
                            </div>
                        </div>
                    </div>
                </div>`;
        });

        container.innerHTML = html;
    }

    // 4. Кнопка "Добавить страницу" -> перенаправление на create_section_page.html
    function goToCreatePage() {
        // Передаем и section_id, и lesson_id (если он определился), чтобы форма создания знала куда сохранять данные
        let targetUrl = `create_section_page.html?section_id=${currentSectionId}`;
        if (currentLessonId) {
            targetUrl += `&lesson_id=${currentLessonId}`;
        }
        window.location.href = targetUrl;
    }

    // 5. Клик по самой карточке страницы -> перенаправление на update_section_page.html
    function goToUpdatePage(pageId) {
        window.location.href = `update_section_page.html?page_id=${pageId}`;
    }

    checkSession();
</script>
</body>
</html>
