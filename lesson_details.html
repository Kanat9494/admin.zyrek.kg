<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали и Редактирование Урока</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .sidebar { min-height: calc(100vh - 90px); border-right: 1px solid #dee2e6; }
        .menu-item { background-color: #007bff; color: white !important; font-weight: 600; }
        .section-card { transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .section-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1) !important; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom bg-white p-3 rounded shadow-sm">
        <div class="d-flex align-items-center">
            <button onclick="window.location.href='lessons.html'" class="btn btn-sm btn-outline-secondary me-3">← К списку уроков</button>
            <h2 class="h4 mb-0 text-primary fw-bold">⚙️ Конструктор Урока</h2>
        </div>
        <span id="status" class="badge bg-warning text-dark fs-6">Проверка сессии...</span>
    </div>

    <div id="admin-content" style="display: none;">
        <div class="row"> 
            
            <div class="col-md-4 col-lg-3 sidebar pe-3">
                <div class="card shadow-sm bg-white mb-3 p-2">
                    <div onclick="window.location.href='lessons.html'" class="p-2 rounded text-center menu-item" style="cursor: pointer;">
                        📚 Уроки
                    </div>
                </div>
            </div>

            <div class="col-md-8 col-lg-9 ps-4">
                
                <div class="card shadow-sm p-4 bg-white mb-4 border-start border-primary border-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="h5 text-dark fw-bold mb-0">📝 Редактировать основную информацию</h4>
                        <span id="db-lesson-id" class="badge bg-light text-secondary border font-monospace">ID: --</span>
                    </div>
                    <div class="row g-2">
                        <div class="col-md-5">
                            <label class="small text-muted fw-bold">Название урока</label>
                            <input type="text" id="edit-lesson-title" class="form-control">
                        </div>
                        <div class="col-md-5">
                            <label class="small text-muted fw-bold">Подзаголовок / Описание</label>
                            <input type="text" id="edit-lesson-subtitle" class="form-control">
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button onclick="updateLessonData()" class="btn btn-success w-100">Сохранить</button>
                        </div>
                    </div>
                </div>

                <h3 class="h4 mb-3 text-secondary fw-bold">Структура разделов (Sections)</h3>
                <div id="sections-container">
                    <div class="text-center my-5 text-muted">
                        <div class="spinner-border text-primary mb-2" role="status"></div>
                        <div>Загрузка разделов...</div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="addSectionModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="modalTitle">➕ Добавить новую секцию</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Название секции (title)</label>
                    <input type="text" id="new-section-title" class="form-control" placeholder="Например: Введение в С#">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Подзаголовок (sub_title)</label>
                    <input type="text" id="new-section-subtitle" class="form-control" placeholder="Например: Основные синтаксические правила">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">Тип секции (section_type)</label>
                    <input type="text" id="new-section-type" class="form-control" placeholder="Например: theory, quiz, practice">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                <button type="button" onclick="createSectionInDB()" class="btn btn-success">Создать секцию</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://cptbrdxodxzbsorqphfl.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_XNNJhqA0GffvW5TI19pr2w_SQ8X_xYf'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let targetLessonId = null;
    let bootstrapModalInstance = null; 

    // 1. Проверяем авторизацию
    async function checkSession() {
        const statusEl = document.getElementById('status');
        const { data: { session } } = await supabaseClient.auth.getSession();

        if (session) {
            statusEl.innerText = `Админ: ${session.user.email}`;
            statusEl.className = "badge bg-success fs-6";
            document.getElementById('admin-content').style.display = 'block';
            initPage();
        } else {
            alert("Доступ запрещен. Войдите в систему.");
            window.location.href = 'index.html';
        }
    }

    // 2. Инициализация страницы
    function initPage() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (!id) return alert("Отсутствует ID урока!");
        
        targetLessonId = parseInt(id);
        document.getElementById('db-lesson-id').innerText = `ID урока: ${targetLessonId}`;
        
        // Связываем модальное окно с переменной
        bootstrapModalInstance = new bootstrap.Modal(document.getElementById('addSectionModal'));

        fetchLessonMeta();
        fetchLessonSections();
    }

    // 3. Загружаем метаданные урока
    async function fetchLessonMeta() {
        const { data: lesson } = await supabaseClient.from('lessons').select('title, sub_title').eq('id', targetLessonId).single();
        if (lesson) {
            document.getElementById('edit-lesson-title').value = lesson.title || '';
            document.getElementById('edit-lesson-subtitle').value = lesson.sub_title || '';
        }
    }

    // 4. Обновление метаданных урока
    async function updateLessonData() {
        const title = document.getElementById('edit-lesson-title').value.trim();
        const subtitle = document.getElementById('edit-lesson-subtitle').value.trim();
        if (!title) return alert("Название урока не может быть пустым!");

        await supabaseClient.from('lessons').update({ title, sub_title: subtitle }).eq('id', targetLessonId);
        alert("Изменения успешно сохранены!");
    }

    // 5. Запрашиваем секции из базы и рендерим список
    async function fetchLessonSections() {
        const container = document.getElementById('sections-container');
        const { data: sections, error } = await supabaseClient.from('sections').select('id, title, sub_title, section_type').eq('lesson_id', targetLessonId);

        if (error) return container.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;

        let html = "";
        const sortedSections = (sections || []).sort((a, b) => a.id - b.id);

        if (sortedSections.length === 0) {
            html = `<div class="alert alert-light border text-muted bg-white shadow-sm mb-3">В этом уроке ещё нет ни одной секции. Добавьте первую!</div>`;
        }

        sortedSections.forEach(section => {
            const badge = section.section_type ? `<span class="badge bg-secondary text-uppercase font-monospace ms-2">${section.section_type}</span>` : '';
            
            // Нажатие на саму карточку перенаправляет на страницу деталей секции
            html += `
                <div class="card shadow-sm my-3 border-start border-success border-3 bg-white section-card" onclick="goToSection(${section.id})">
                    <div class="card-body py-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="h6 text-success fw-bold mb-1">⚙️ Секция: ${section.title || 'Без названия'} ${badge}</h5>
                                ${section.sub_title ? `<p class="text-muted small mb-0">${section.sub_title}</p>` : ''}
                            </div>
                            <small class="text-muted font-monospace">ID секции: ${section.id}</small>
                        </div>
                    </div>
                </div>`;
        });

        // Кнопка внизу просто открывает модалку для создания
        html += `
            <div class="mt-4">
                <button class="btn btn-sm btn-outline-info" onclick="bootstrapModalInstance.show()">➕ Добавить секцию в урок</button>
            </div>`;
        
        container.innerHTML = html;
    }

    // 6. Добавление новой секции напрямую в Supabase
    async function createSectionInDB() {
        const titleInp = document.getElementById('new-section-title');
        const subtitleInp = document.getElementById('new-section-subtitle');
        const typeInp = document.getElementById('new-section-type');

        if (!titleInp.value.trim()) return alert("Укажите название секции!");

        const { error } = await supabaseClient
            .from('sections')
            .insert([{
                title: titleInp.value.trim(),
                sub_title: subtitleInp.value.trim(),
                section_type: typeInp.value.trim(),
                lesson_id: targetLessonId
            }]);

        if (error) {
            alert("Ошибка при создании: " + error.message);
        } else {
            bootstrapModalInstance.hide();
            // Очищаем инпуты
            titleInp.value = '';
            subtitleInp.value = '';
            typeInp.value = '';
            // Перерисовываем список
            fetchLessonSections(); 
        }
    }

    // 7. Глобальная функция перенаправления на section_details.html
    function goToSection(sectionId) {
        window.location.href = `section_details.html?id=${sectionId}`;
    }

    checkSession();
</script>
</body>
</html>
