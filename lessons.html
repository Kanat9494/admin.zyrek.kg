<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление Уроками</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .sidebar { min-height: calc(100vh - 90px); border-right: 1px solid #dee2e6; }
        .menu-item { background-color: #007bff; color: white !important; font-weight: 600; }
        .lesson-card { transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .lesson-card:hover { transform: translateY(-2px); box-shadow: 0.5rem 1rem 1rem rgba(0,0,0,0.15) !important; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom bg-white p-3 rounded shadow-sm">
        <div class="d-flex align-items-center">
            <button onclick="window.location.href='index.html'" class="btn btn-sm btn-outline-secondary me-3">← На главную</button>
            <h2 class="h4 mb-0 text-primary fw-bold">🎓 Панель управления обучением</h2>
        </div>
        <span id="status" class="badge bg-warning text-dark fs-6">Проверка сессии...</span>
    </div>

    <div id="admin-content" style="display: none;">
        <div class="row"> 
            
            <div class="col-md-4 col-lg-3 sidebar pe-3">
                <div class="card shadow-sm bg-white mb-3 p-2">
                    <div class="p-2 rounded text-center menu-item">
                        📚 Уроки
                    </div>
                </div>
            </div>

            <div class="col-md-8 col-lg-9 ps-4">
                <div id="center-content">
                    </div>
            </div>

        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://cptbrdxodxzbsorqphfl.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_XNNJhqA0GffvW5TI19pr2w_SQ8X_xYf'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let allLessonsData = [];

    // Проверка сессии
    async function checkSession() {
        const statusEl = document.getElementById('status');
        const { data: { session } } = await supabaseClient.auth.getSession();

        if (session) {
            statusEl.innerText = `Админ: ${session.user.email}`;
            statusEl.className = "badge bg-success fs-6";
            document.getElementById('admin-content').style.display = 'block';
            loadLessonsFromServer();
        } else {
            alert("Доступ запрещен. Войдите в систему.");
            window.location.href = 'index.html';
        }
    }

    // Загрузка плоского списка уроков с сервера
    async function loadLessonsFromServer() {
        const centerContainer = document.getElementById('center-content');
        centerContainer.innerHTML = `
            <div class="text-center my-5 text-muted">
                <div class="spinner-border text-primary mb-2" role="status"></div>
                <div>Загрузка списка уроков...</div>
            </div>`;

        const { data: lessons, error } = await supabaseClient
            .from('lessons')
            .select('id, title, sub_title, created_at')
            .order('id', { ascending: true });

        if (error) {
            centerContainer.innerHTML = `<div class="alert alert-danger">Ошибка: ${error.message}</div>`;
            return;
        }

        allLessonsData = lessons;
        renderLessonsDashboard();
    }

    // Отрисовка ГЛАВНОГО СПИСКА уроков по центру экрана
    function renderLessonsDashboard() {
        const centerContainer = document.getElementById('center-content');
        
        let html = `
            <div class="card shadow-sm p-4 bg-white mb-4 border-start border-primary border-4">
                <h4 class="h5 text-dark fw-bold mb-3">➕ Создать новый Урок</h4>
                <div class="row g-2">
                    <div class="col-md-5">
                        <input type="text" id="lesson-title" class="form-control" placeholder="Название урока (например: Математика 1 класс)">
                    </div>
                    <div class="col-md-5">
                        <input type="text" id="lesson-subtitle" class="form-control" placeholder="Подзаголовок / Описание">
                    </div>
                    <div class="col-md-2">
                        <button onclick="createLesson()" class="btn btn-primary w-100">Создать</button>
                    </div>
                </div>
            </div>

            <h3 class="h4 mb-3 text-secondary fw-bold">Доступные уроки</h3>
            <div class="list-group shadow-sm bg-white rounded">
        `;

        if (allLessonsData.length === 0) {
            html += `
                <div class="p-4 text-center text-muted">
                    Уроков пока нет. Создайте первый урок с помощью формы выше!
                </div>`;
        }

        allLessonsData.forEach(lesson => {
            html += `
                <div class="list-group-item list-group-item-action p-3 lesson-card" 
                     onclick="selectLesson(${lesson.id})" 
                     style="cursor: pointer; transition: background-color 0.2s;">
                    <div class="d-flex w-100 justify-content-between align-items-center">
                        <div>
                            <h5 class="text-primary fw-bold mb-1">📁 ${lesson.title}</h5>
                            <p class="text-muted small mb-0">${lesson.sub_title || 'Нет описания'}</p>
                        </div>
                        <span class="badge bg-light text-secondary border font-monospace">ID: ${lesson.id}</span>
                    </div>
                </div>
            `;
        });

        html += `</div>`;
        centerContainer.innerHTML = html;
    }

    // Создание урока
    async function createLesson() {
        const titleInput = document.getElementById('lesson-title');
        const subtitleInput = document.getElementById('lesson-subtitle');
        if(!titleInput.value.trim()) return alert("Введите название урока!");

        const { error } = await supabaseClient
            .from('lessons')
            .insert([{ title: titleInput.value.trim(), sub_title: subtitleInput.value.trim() }]);

        if (error) alert("Ошибка: " + error.message);
        else {
            loadLessonsFromServer();
        }
    }

    // Загрузка детальной структуры (Секции и Страницы) выбранного урока
    function selectLesson(lessonId) {
    window.location.href = `lesson_details.html?id=${lessonId}`;
}

    checkSession();
</script>
</body>
</html>
