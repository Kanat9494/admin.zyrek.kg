<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора Викторины</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        .sidebar {
            min-height: calc(100vh - 90px);
            border-right: 1px solid #dee2e6;
        }
        .menu-item {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .menu-item:hover {
            background-color: #007bff;
            color: white !important;
        }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid px-4 py-4">
    
    <div class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom bg-white p-3 rounded shadow-sm">
        <h2 class="h4 mb-0 text-primary fw-bold">🎓 Панель управления обучением</h2>
        <span id="status" class="badge bg-warning text-dark fs-6">Проверка сессии...</span>
    </div>

    <div id="login-form" class="card shadow mx-auto my-5" style="display: none; max-width: 400px;">
        <div class="card-header bg-primary text-white text-center py-3">
            <h3 class="card-title h5 mb-0">Вход для администратора</h3>
        </div>
        <div class="card-body p-4">
            <div class="mb-3">
                <label class="form-label">Email адрес</label>
                <input type="email" id="email" class="form-control" placeholder="admin@course.kg">
            </div>
            <div class="mb-4">
                <label class="form-label">Пароль</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••">
            </div>
            <button onclick="login()" class="btn btn-primary w-100 py-2">Войти в панель</button>
        </div>
    </div> 

    <div id="admin-content" style="display: none;">
        <div class="row"> 
            
            <div class="col-md-4 col-lg-3 sidebar pe-3">
                <div class="card shadow-sm bg-white mb-3 p-2">
                    <div onclick="window.location.href='lessons.html'" class="p-2 rounded text-dark fw-bold menu-item text-center">
                        📚 Уроки
                    </div>
                </div>
                <button class="btn btn-sm btn-outline-danger w-100" onclick="logout()">Выйти из аккаунта</button>
            </div>

            <div class="col-md-8 col-lg-9 ps-4">
                <div id="center-content">
                    <div class="card shadow-sm text-center py-5 bg-white text-muted">
                        <div class="card-body">
                            <h3 class="h4 mb-2">Добро пожаловать в админ-панель!</h3>
                            <p class="mb-0">Выберите раздел <b>«Уроки»</b> в меню слева, чтобы перейти к управлению курсами.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bundle.min.js"></script>

<script>
    const SUPABASE_URL = 'https://cptbrdxodxzbsorqphfl.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_XNNJhqA0GffvW5TI19pr2w_SQ8X_xYf'; 

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkSession() {
        const statusEl = document.getElementById('status');
        const { data: { session } } = await supabaseClient.auth.getSession();

        if (session) {
            statusEl.innerText = `Админ: ${session.user.email}`;
            statusEl.className = "badge bg-success fs-6";
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
        } else {
            statusEl.innerText = "Требуется вход";
            statusEl.className = "badge bg-danger fs-6";
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('admin-content').style.display = 'none';
        }
    }

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert("Ошибка: " + error.message);
        else checkSession();
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        checkSession();
    }

    checkSession();
</script>
</body>
</html>
